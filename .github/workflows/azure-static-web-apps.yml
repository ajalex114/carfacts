name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master]
  schedule:
    # Rebuild daily at 07:30 UTC (1:00 PM IST) — picks up the new post published by Azure Functions
    - cron: '30 7 * * *'

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/carfacts-web/package-lock.json

      - name: Install dependencies
        working-directory: src/carfacts-web
        run: npm ci

      - name: Set site URL
        id: site_url
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "url=https://brave-pond-064f8920f-${{ github.event.pull_request.number }}.eastus2.7.azurestaticapps.net" >> $GITHUB_OUTPUT
          else
            echo "url=https://carfactsdaily.com" >> $GITHUB_OUTPUT
          fi

      - name: Build Next.js static export
        working-directory: src/carfacts-web
        run: npm run build
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_ADSENSE_PUBLISHER_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_PUBLISHER_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.site_url.outputs.url }}
          COSMOS_ENDPOINT: ${{ secrets.COSMOS_ENDPOINT }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/carfacts-web/out
          skip_app_build: true
          output_location: ""

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Environment

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
          app_location: src/carfacts-web/out
          skip_app_build: true
